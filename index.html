<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Dashboard Empresa</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="principal.css"/>
    <script src="js/authGuard.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo-box">
            <img src="recursos/logoALMCK.jpeg" alt="Logo de la empresa" width="75" style="border-radius: 12px; display: block;"> 
        </div>

        <div class="header-icons">
            <button class="icon-btn" title="Usuario" aria-label="Usuario">
                <svg width="26" height="26" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="13" r="6" fill="currentColor"/>
                    <path d="M6 30c0-6.627 5.373-10 12-10s12 3.373 12 10" fill="currentColor"/>
                </svg>
            </button>

            <button class="icon-btn" title="Configuración" aria-label="Configuración">
                <svg width="26" height="26" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="18" r="4.5"/>
                    <path d="M18 4v3M18 29v3M4 18h3M29 18h3 M7.5 7.5l2.1 2.1M26.4 26.4l2.1 2.1 M7.5 28.5l2.1-2.1M26.4 9.6l2.1-2.1"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="actions-grid">
            <a href="vistas/ventas.html" class="action-btn">
                <div class="icon-wrapper">🛍️</div>
                Realizar Venta
            </a> 

            <a href="vistas/inventario.html" class="action-btn">
                <div class="icon-wrapper">📦</div>
                Inventario
            </a>

            <a href="vistas/Gestión.html" class="action-btn" id="btn-gestion">
                <div class="icon-wrapper">📊</div>
                Gestión
            </a>

            <a href="vistas/clientes.html" class="action-btn">
                <div class="icon-wrapper">👥</div>
                Clientes
            </a>
        </div>
    </main>

    <a href="#" class="btn-salir" title="Salir" aria-label="Salir" onclick="localStorage.removeItem('usuarioLogueado'); window.location.href='Vistas/incioSesion.html'; return false;">
        Salir
    </a>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
