<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Gestión - ALMCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"

  <link rel="stylesheet" href="../estilos/gestion.css" />

      <!-- Botón hacia Empleados -->
      <a class="action-btn" href="empleados.html"

      <!-- Botón hacia Historial de Ventas -->
      <a class="action-btn" href="historialVentas.html"
        style="text-decoration: none; color: inherit; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;">

      </a>

    </div>
  </main>

  <footer class="footer">
    <a class="nav-pill nav-pill--back" href="../index.html">← Regresar al Menú Principal</a>
  </footer>
