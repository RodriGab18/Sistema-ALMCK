<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Producto - Sistema ALMCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../estilos/inventario.css">
  <script src="../js/authGuard.js"></script>
</head>

<body>
  <header class="header centered-header">
    <div class="logo-box">
      <img src="../recursos/logoALMCK.jpeg" width="100" alt="Logo">
    </div>
  </header>

  <main>
    <div class="form-container">
      <h1>➕ Agregar Nuevo Producto</h1>

      <div id="connectionStatus" class="loading">🔌 Verificando conexión...</div>

      <form id="productoForm">
        <div class="form-group">
          <label for="nombre">Nombre del Producto *</label>
          <input type="text" id="nombre" required placeholder="Ej: Camisa de algodón">
        </div>

        <div class="form-group">
          <label for="cantidad">Cantidad *</label>
          <input type="number" id="cantidad" min="0" required placeholder="0">
        </div>

        <div class="form-group">
          <label for="tipo">Tipo de Producto *</label>
          <select id="tipo" required>
            <option value="">Cargando tipos...</option>
          </select>
          <button type="button" id="btnToggleNuevoTipo"
            style="margin-top: 6px; background: none; border: none; color: #6366f1; cursor: pointer; font-family: 'DM Sans'; font-size: 0.9rem; padding: 0; text-align: left;">+
            Crear nuevo tipo de producto</button>

          <!-- Mini-formulario inline para crear tipo -->
          <div id="nuevoTipoContainer"
            style="display: none; margin-top: 10px; padding: 12px; border: 2px dashed #c7d2fe; border-radius: 12px; background: #eef2ff;">
            <label style="font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; display: block;">Nombre del nuevo
              tipo</label>
            <div style="display: flex; gap: 8px;">
              <input type="text" id="nuevoTipoNombre" placeholder="Ej: Zapatos"
                style="flex: 1; padding: 8px 12px; border-radius: 8px; border: 2px solid #c7d2fe; font-family: 'DM Sans';">
              <button type="button" id="btnGuardarTipo"
                style="padding: 8px 16px; border-radius: 8px; border: none; background: #6366f1; color: white; font-family: 'DM Sans'; font-weight: 500; cursor: pointer;">Guardar</button>
              <button type="button" id="btnCancelarTipo"
                style="padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; font-family: 'DM Sans'; cursor: pointer;">✕</button>
            </div>
            <div id="tipoMessage" style="margin-top: 6px; font-size: 0.85rem; display: none;"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="precio">Precio *</label>
          <input type="number" id="precio" step="0.01" min="0" required placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="caducidad">Fecha de Caducidad</label>
          <input type="date" id="caducidad">
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="disponible" checked>
            Producto Disponible
          </label>
        </div>

        <button type="submit" id="submitBtn" class="btn-action btn-action--success btn-action--full">Guardar
          Producto</button>
      </form>

      <div id="message" class="message"></div>
    </div>
  </main>

  <footer class="form-footer">
    <button>
      <a class="btn-salir" href="inventario.html">Regresar</a>
    </button>
  </footer>

  <script type="module">
    // 1. Importar dbInventario y la función de prueba
    import { dbInventario, testSupabaseConnection } from '../js/supabaseClient.js';

    const form = document.getElementById('productoForm');
    const messageDiv = document.getElementById('message');
    const connectionStatus = document.getElementById('connectionStatus');
    const submitBtn = document.getElementById('submitBtn');
    const selectTipo = document.getElementById('tipo');

    // --- Elementos del mini-formulario de nuevo tipo ---
    const btnToggle = document.getElementById('btnToggleNuevoTipo');
    const container = document.getElementById('nuevoTipoContainer');
    const inputNuevoTipo = document.getElementById('nuevoTipoNombre');
    const btnGuardar = document.getElementById('btnGuardarTipo');
    const btnCancelar = document.getElementById('btnCancelarTipo');
    const tipoMsg = document.getElementById('tipoMessage');

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      if (type === 'success') {
        setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
      }
    }

    function showTipoMsg(text, color) {
      tipoMsg.textContent = text;
      tipoMsg.style.color = color;
      tipoMsg.style.display = 'block';
      setTimeout(() => { tipoMsg.style.display = 'none'; }, 3000);
    }

    // --- Cargar tipos de producto desde la BD ---
    async function cargarTipos(seleccionarId = null) {
      selectTipo.innerHTML = '<option value="">Cargando tipos...</option>';
      try {
        const { data, error } = await dbInventario
          .from('tipos_producto') // CORRECCIÓN: 'tipos_producto' en plural
          .select('id, nombre')
          .order('nombre', { ascending: true });

        if (error) throw error;

        selectTipo.innerHTML = '<option value="">Seleccione un tipo</option>';
        if (data && data.length > 0) {
          data.forEach(t => {
            const opt = new Option(t.nombre, t.id);
            selectTipo.add(opt);
          });
        }

        // Si acabamos de crear uno, seleccionarlo automáticamente
        if (seleccionarId) {
          selectTipo.value = seleccionarId;
        }
      } catch (err) {
        console.error('Error cargando tipos:', err);
        selectTipo.innerHTML = '<option value="">Error al cargar tipos</option>';
      }
    }

    // --- Toggle del mini-formulario ---
    btnToggle.addEventListener('click', () => {
      container.style.display = container.style.display === 'none' ? 'block' : 'none';
      if (container.style.display === 'block') inputNuevoTipo.focus();
    });

    btnCancelar.addEventListener('click', () => {
      container.style.display = 'none';
      inputNuevoTipo.value = '';
    });

    // --- Guardar nuevo tipo de producto ---
    btnGuardar.addEventListener('click', async () => {
      const nombre = inputNuevoTipo.value.trim();
      if (!nombre) {
        showTipoMsg('⚠️ Escribe un nombre para el tipo.', '#ef4444');
        return;
      }

      btnGuardar.disabled = true;
      btnGuardar.textContent = 'Guardando...';

      try {
        const { data, error } = await dbInventario
          .from('tipos_producto') // CORRECCIÓN: 'tipos_producto' en plural
          .insert([{ nombre: nombre }])
          .select()
          .single();

        if (error) throw error;

        showTipoMsg('✅ Tipo creado correctamente.', '#10b981');
        inputNuevoTipo.value = '';
        container.style.display = 'none';

        // Recargar el select y seleccionar el nuevo tipo
        await cargarTipos(data.id);
      } catch (err) {
        console.error('Error creando tipo:', err);
        showTipoMsg('❌ Error: ' + err.message, '#ef4444');
      } finally {
        btnGuardar.disabled = false;
        btnGuardar.textContent = 'Guardar';
      }
    });

    // Permitir Enter en el input de nuevo tipo
    inputNuevoTipo.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); btnGuardar.click(); }
    });

    // --- Verificar conexión al cargar ---
    async function checkConnection() {
      const isConnected = await testSupabaseConnection();
      if (isConnected) {
        connectionStatus.textContent = '✅ Conectado a Supabase (Esquema: inventario)';
        connectionStatus.style.color = '#10b981';
      } else {
        connectionStatus.textContent = '❌ Error de conexión. Revisa Exposed Schemas.';
        connectionStatus.style.color = '#ef4444';
        submitBtn.disabled = true;
      }
    }

    // --- Enviar formulario de producto ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value.trim();
      const cantidad = parseInt(document.getElementById('cantidad').value);
      const tipoId = parseInt(document.getElementById('tipo').value);
      const precio = parseFloat(document.getElementById('precio').value);
      const caducidad = document.getElementById('caducidad').value || null;
      const disponible = document.getElementById('disponible').checked;

      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Guardando...';
      submitBtn.disabled = true;

      try {
        const nuevoProducto = {
          nombreProducto: nombre,
          precioProducto: precio,
          cantidadProducto: cantidad,
          TipoProducto: tipoId,
          Disponiblilidad: disponible,
          Caducidad: caducidad
        };

        const { data, error } = await dbInventario
          .from('productos')
          .insert([nuevoProducto])
          .select();

        if (error) {
          console.error('Error Supabase:', error);
          const errorMsg = error.code === '405' ? 'Error 405: El esquema "inventario" no está expuesto' : error.message;
          showMessage('❌ Error: ' + errorMsg, 'error');
        } else {
          showMessage('✅ Producto guardado exitosamente', 'success');
          form.reset();
          document.getElementById('disponible').checked = true;

          setTimeout(() => {
            window.location.href = 'inventario.html';
          }, 2000);
        }
      } catch (error) {
        console.error('Error inesperado:', error);
        showMessage('❌ Error inesperado de conexión.', 'error');
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    // --- Inicialización ---
    checkConnection();
    cargarTipos();
  </script>

</body>

</html>
