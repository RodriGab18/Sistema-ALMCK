<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="../estilos/ventas.css" />
  <script src="../js/authGuard.js"></script>
</head>
<body>
    <header class="header">
      <div class="logo-box">
        <img src="../recursos/logoALMCK.jpeg" width="100" alt="Logo">
      </div>

      <nav class="header-icons">
        <button class="icon-btn" title="Perfil">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="7" r="4"/>
            <path d="M2 21c0-5.523 4.477-10 10-10s10 4.477 10 10"/>
          </svg>
        </button>

        <button class="icon-btn" title="Configuración">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </nav>
    </header>

      <main class="main-content">
        <div class="actions-grid">
          <a class="action-btn" href="consultaInventario.html">
            <span style="font-size: 3rem;">📋</span>
              Consultar Inventario
            </a>

          <a class="action-btn" href="agregarProducto.html">
            <span style="font-size: 3rem;">➕</span>
              Agregar Producto
          </a>
        </div>
      </main>

    <footer class="footer">
        <a class="nav-pill nav-pill--back" href="../index.html">
            <span class="nav-pill__icon">&#8592;</span>
            Regresar al Menú Principal
        </a>
    </footer>

    <script type="module">
      // Importamos el cliente específico para inventario
      import { dbInventario } from '../supabaseClient.js';
      
      async function testConnection() {
        try {
          const { count, error } = await dbInventario
            .from('productos')
            .select('*', { count: 'exact', head: true });
          
          if (error) {
            console.error('❌ Error de conexión:', error.message);
          } else {
            console.log('✅ Conexión exitosa. Productos registrados:', count);
          }
        } catch (error) {
          console.error('❌ Fallo crítico:', error);
        }
      }
      
      testConnection();
    </script>
</body>
</html>
