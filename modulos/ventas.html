<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nueva Venta - Sistema ALMCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estiloInventario.css">
  <style>
    /* Ajustes específicos para la interfaz de ventas */
    .sales-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-top: 20px; }
    .cart-container { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
    .product-search-results { max-height: 200px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; background: white;}
    .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;}
    .search-item:hover { background: #f0f0f0; }
    .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #ccc; }
    .total-section { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; margin-top: 20px; text-align: right; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
    select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    .btn-pay { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .btn-pay:disabled { background: #ccc; }
  </style>
</head>
<body>
  <header class="header centered-header">
    <img src="../recursos/logoALMCK.jpeg" width="80" alt="Logo">
  </header>

  <main class="main-container">
    <h1>🛒 Nueva Venta</h1>

    <div class="sales-grid">
      <section>
        <div class="form-group">
          <label>Buscar Producto</label>
          <input type="text" id="prodSearch" placeholder="Escribe nombre del producto..." autocomplete="off">
          <div id="searchResults" class="product-search-results" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label>Empleado que atiende</label>
          <select id="selectEmpleado">
            <option value="">Seleccione Empleado...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Cliente</label>
          <select id="selectCliente">
            <option value="">Seleccione Cliente...</option>
          </select>
        </div>
      </section>

      <section class="cart-container">
        <h3>Resumen de Venta</h3>
        <div id="cartItems">
          <p style="color: #888;">El carrito está vacío</p>
        </div>

        <div class="total-section" id="totalDisplay">Total: Q 0.00</div>

        <div class="form-group" style="margin-top: 20px;">
          <label><input type="checkbox" id="checkDeuda"> Es venta al crédito (Deuda)</label>
        </div>

        <button id="btnFinalizar" class="btn-pay" disabled>Finalizar Venta</button>
      </section>
    </div>
  </main>

  <footer class="centered-footer">
    <button class="btn-pill" onclick="window.location.href='../index.html'">← Regresar al Menú</button>
  </footer>

  <script type="module">
    import { dbInventario, dbPersonas, dbVentas } from '../../supabaseClient.js';

    let carrito = [];
    let totalVenta = 0;

    // --- CARGA INICIAL ---
    async function inicializar() {
      // Cargar Empleados
      const { data: empleados } = await dbPersonas.from('empleados').select('id, nombre').eq('activo', true);
      empleados.forEach(e => {
        const opt = new Option(e.nombre, e.id);
        document.getElementById('selectEmpleado').add(opt);
      });

      // Cargar Clientes
      const { data: clientes } = await dbPersonas.from('clientes').select('id, nombre');
      clientes.forEach(c => {
        const opt = new Option(c.nombre, c.id);
        document.getElementById('selectCliente').add(opt);
      });
    }

    // --- BUSCADOR DE PRODUCTOS ---
    document.getElementById('prodSearch').addEventListener('input', async (e) => {
      const term = e.target.value;
      const resultsDiv = document.getElementById('searchResults');
      
      if (term.length < 2) { resultsDiv.style.display = 'none'; return; }

      const { data: prods } = await dbInventario
        .from('productos')
        .select('*')
        .ilike('nombreProducto', `%${term}%`)
        .gt('cantidadProducto', 0)
        .limit(5);

      resultsDiv.innerHTML = '';
      if (prods.length > 0) {
        resultsDiv.style.display = 'block';
        prods.forEach(p => {
          const div = document.createElement('div');
          div.className = 'search-item';
          div.innerHTML = `<span>${p.nombreProducto}</span> <b>Q${p.precioProducto}</b>`;
          div.onclick = () => agregarAlCarrito(p);
          resultsDiv.appendChild(div);
        });
      }
    });

    function agregarAlCarrito(p) {
      const existe = carrito.find(item => item.ProductoID === p.ProductoID);
      if (existe) {
        existe.cantidad++;
      } else {
        carrito.push({ ...p, cantidad: 1 });
      }
      document.getElementById('searchResults').style.display = 'none';
      document.getElementById('prodSearch').value = '';
      renderizarCarrito();
    }

    function renderizarCarrito() {
      const container = document.getElementById('cartItems');
      const btn = document.getElementById('btnFinalizar');
      container.innerHTML = '';
      totalVenta = 0;

      if (carrito.length === 0) {
        container.innerHTML = '<p style="color: #888;">El carrito está vacío</p>';
        btn.disabled = true;
      } else {
        btn.disabled = false;
        carrito.forEach((item, index) => {
          totalVenta += (item.precioProducto * item.cantidad);
          const div = document.createElement('div');
          div.className = 'cart-item';
          div.innerHTML = `
            <span>${item.nombreProducto} (x${item.cantidad})</span>
            <span>Q${(item.precioProducto * item.cantidad).toFixed(2)}</span>
          `;
          container.appendChild(div);
        });
      }
      document.getElementById('totalDisplay').innerText = `Total: Q ${totalVenta.toFixed(2)}`;
    }

    // --- LÓGICA DE VENTA FINAL ---
    document.getElementById('btnFinalizar').onclick = async () => {
      const clienteId = document.getElementById('selectCliente').value;
      const empleadoId = document.getElementById('selectEmpleado').value;
      const esDeuda = document.getElementById('checkDeuda').checked;

      if (!clienteId || !empleadoId) {
        alert("Por favor selecciona cliente y empleado");
        return;
      }

      try {
        // 1. Crear la Venta
        const { data: venta, error: eVenta } = await dbVentas.from('ventas').insert({
          cliente_id: clienteId,
          empleado_id: empleadoId,
          total: totalVenta,
          metodo_pago: esDeuda ? 'Crédito' : 'Efectivo'
        }).select().single();

        if (eVenta) throw eVenta;

        // 2. Detalles e Inventario
        for (const item of carrito) {
          await dbVentas.from('detalles_venta').insert({
            venta_id: venta.id,
            producto_id: item.ProductoID,
            cantidad: item.cantidad,
            precio_unitario: item.precioProducto
          });

          // Descontar stock
          await dbInventario.from('productos')
            .update({ cantidadProducto: item.cantidadProducto - item.cantidad })
            .eq('ProductoID', item.ProductoID);
        }

        // 3. Actualizar Cliente
        const { data: cData } = await dbPersonas.from('clientes').select('*').eq('id', clienteId).single();
        const updates = {
          contador_compras: (cData.contador_compras || 0) + 1,
          monto_deuda: esDeuda ? (cData.monto_deuda || 0) + totalVenta : cData.monto_deuda,
          estado_deuda: esDeuda ? true : cData.estado_deuda
        };
        await dbPersonas.from('clientes').update(updates).eq('id', clienteId);

        alert("✅ Venta realizada con éxito");
        location.reload();

      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    inicializar();
  </script>
</body>
</html>
