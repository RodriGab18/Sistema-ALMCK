<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Clientes - Sistema ALMCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estiloInventario.css">
  <style>
    /* Estilos de la Interfaz Principal */
    .filters-container {
      display: flex; gap: 15px; align-items: center;
      margin-bottom: 25px; flex-wrap: wrap;
    }
    .search-input { flex: 1; min-width: 250px; padding: 12px; border-radius: 12px; border: 1px solid #ddd; }
    
    .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .status-clean { background: #dcfce7; color: #166534; }
    .status-debt { background: #fee2e2; color: #991b1b; }
    
    /* Estilos del Modal (Efecto Pastel) */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(91, 33, 182, 0.15); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content {
      background: white; padding: 35px; border-radius: 24px;
      width: 90%; max-width: 550px; max-height: 90vh; overflow-y: auto;
      border: 4px solid #ffcce1; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn-close { background: #ffcce1; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-weight: bold; }

    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-family: 'Syne'; font-weight: 700; font-size: 0.9rem; color: #5b21b6; }
    .form-group input, .form-group textarea { padding: 10px; border-radius: 10px; border: 2px solid #f3e8ff; font-family: 'DM Sans'; }
    .form-group input:focus { border-color: #ffcce1; outline: none; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    
    .direccion-tag { display: block; font-size: 0.8rem; color: #666; margin-top: 2px; }
  </style>
</head>
<body>
  <header class="header centered-header">
    <img src="../recursos/logoALMCK.jpeg" width="80" alt="Logo">
  </header>

  <main class="main-container">
    <h1>👥 Directorio de Clientes</h1>

    <div class="filters-container">
      <input type="text" id="nameSearch" class="search-input" placeholder="🔍 Buscar cliente por nombre...">
      
      <label class="debtor-filter" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
        <input type="checkbox" id="debtorOnly"> 
        <span style="font-family: 'DM Sans';">Solo deudores</span>
      </label>

      <button onclick="cargarClientes()" class="btn-action btn-action--accent">Aplicar</button>
      <button onclick="abrirModalNuevo()" class="btn-action btn-action--secondary" style="background:#d1fae5;">+ Nuevo Cliente</button>
    </div>

    <div id="clientesList">
      <div class="loading">Cargando base de datos de clientes...</div>
    </div>
  </main>

  <div id="modalCliente" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 style="font-family: 'Syne';">✨ Registro de Cliente</h2>
        <button class="btn-close" onclick="cerrarModal()">×</button>
      </div>
      
      <form id="nuevoClienteForm">
        <div class="form-group">
          <label>Nombre Completo *</label>
          <input type="text" id="c_nombre" required placeholder="Ej: Ana García">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="c_telefono" placeholder="5555-4444">
          </div>
          <div class="form-group">
            <label>Deuda Inicial (Q)</label>
            <input type="number" id="c_deuda" step="0.01" value="0" min="0">
          </div>
        </div>

        <div class="form-group">
          <label>Dirección Principal *</label>
          <input type="text" id="c_dir1" required placeholder="Ubicación de entrega principal">
        </div>

        <div class="form-group">
          <label>Direcciones Opcionales</label>
          <input type="text" id="c_dir2" placeholder="Segunda dirección" style="margin-bottom: 5px;">
          <input type="text" id="c_dir3" placeholder="Tercera dirección">
        </div>

        <div class="form-group">
          <label>Notas Extra</label>
          <textarea id="c_comentarios" rows="2" placeholder="Preferencias, referencias de color, etc."></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-pill" onclick="cerrarModal()" style="border:none; cursor:pointer;">Cancelar</button>
          <button type="submit" class="btn-action" style="background:#ffcce1; border:none; padding: 12px 25px; cursor:pointer;">💾 Guardar Cliente</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="centered-footer" style="margin-top: 40px;">
    <button class="btn-pill" onclick="window.location.href='../index.html'">← Regresar al Menú</button>
  </footer>

  <script type="module">
    import { dbPersonas } from '../../supabaseClient.js';

    const formatter = new Intl.NumberFormat('es-GT', { style: 'currency', currency: 'GTQ' });

    async function cargarClientes() {
      const container = document.getElementById('clientesList');
      const searchTerm = document.getElementById('nameSearch').value;
      const soloDeudores = document.getElementById('debtorOnly').checked;

      container.innerHTML = '<div class="loading">⏳ Filtrando clientes...</div>';

      try {
        let query = dbPersonas.from('clientes').select('*');

        if (searchTerm) query = query.ilike('nombre', `%${searchTerm}%`);
        if (soloDeudores) query = query.eq('estado_deuda', true);

        const { data, error } = await query.order('nombre', { ascending: true });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="loading">👤 Sin resultados.</div>';
          return;
        }

        const html = `
          <table class="productos-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente / Direcciones</th>
                <th>Teléfono</th>
                <th>Compras</th>
                <th>Deuda</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(c => `
                <tr>
                  <td>#${c.id}</td>
                  <td>
                    <strong>${c.nombre}</strong>
                    <span class="direccion-tag">🏠 ${c.direccion_principal}</span>
                    ${c.direccion_secundaria ? `<span class="direccion-tag">📍 ${c.direccion_secundaria}</span>` : ''}
                  </td>
                  <td>${c.telefono || '--'}</td>
                  <td style="font-weight:bold;">🛒 ${c.contador_compras || 0}</td>
                  <td style="color: ${c.monto_deuda > 0 ? '#e74c3c' : '#2ecc71'}; font-weight:bold;">
                    ${formatter.format(c.monto_deuda || 0)}
                  </td>
                  <td>
                    <span class="status-badge ${c.estado_deuda ? 'status-debt' : 'status-clean'}">
                      ${c.estado_deuda ? '⚠️ Deudor' : '✓ Al día'}
                    </span>
                  </td>
                  <td>
                    <button class="btn-editar" onclick="editarCliente(${c.id})">✏️</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="message error" style="display:block;">Error: ${err.message}</div>`;
      }
    }

    // --- FUNCIONES GLOBALES ---
    window.abrirModalNuevo = () => {
      document.getElementById('modalCliente').style.display = 'flex';
    };

    window.cerrarModal = () => {
      document.getElementById('modalCliente').style.display = 'none';
      document.getElementById('nuevoClienteForm').reset();
    };

    window.editarCliente = (id) => {
      console.log("Editar cliente:", id);
      // Aquí podrías redirigir o abrir otro modal de edición
    };

    // --- MANEJO DEL FORMULARIO ---
    document.getElementById('nuevoClienteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const deuda = parseFloat(document.getElementById('c_deuda').value) || 0;
      
      const datos = {
        nombre: document.getElementById('c_nombre').value.trim(),
        telefono: document.getElementById('c_telefono').value.trim(),
        monto_deuda: deuda,
        estado_deuda: deuda > 0,
        comentarios: document.getElementById('c_comentarios').value.trim(),
        direccion_principal: document.getElementById('c_dir1').value.trim(),
        direccion_secundaria: document.getElementById('c_dir2').value.trim() || null,
        direccion_tercera: document.getElementById('c_dir3').value.trim() || null,
        contador_compras: 0
      };

      try {
        const { error } = await dbPersonas.from('clientes').insert([datos]);
        if (error) throw error;
        
        alert("✅ Cliente guardado con éxito");
        cerrarModal();
        cargarClientes();
      } catch (err) {
        alert("❌ Error: " + err.message);
      }
    });

    document.getElementById('debtorOnly').addEventListener('change', cargarClientes);
    cargarClientes();
  </script>
</body>
</html>
