<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Personal - ALMCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" /> <style>
    /* Estilos específicos para la tabla de empleados */
    .employee-table-container { margin-top: 40px; background: white; border-radius: 20px; padding: 20px; box-shadow: var(--shadow-card); }
    table { width: 100%; border-collapse: collapse; font-family: 'DM Sans'; }
    th { text-align: left; padding: 15px; border-bottom: 2px solid var(--bg-card); color: var(--icon-color); font-family: 'Syne'; }
    td { padding: 15px; border-bottom: 1px solid #eee; }
    
    /* Reutilizamos el estilo del modal de clientes */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.1); backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content {
      background: white; padding: 40px; border-radius: var(--radius-card);
      width: 90%; max-width: 500px; border: 4px solid var(--accent);
    }
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
    .form-group input { padding: 12px; border-radius: 12px; border: 2px solid var(--bg-card); }
  </style>
</head>
<body>
    <header class="header">
      <div class="logo-box">
        <img src="../recursos/logoALMCK.jpeg" width="100">
      </div>
      <h1 style="font-family: 'Syne'; color: var(--icon-color);">RRHH - Gestión</h1>
    </header>

    <main class="main-content" style="flex-direction: column; gap: 40px;">
      <div class="actions-grid">
        <button class="action-btn" onclick="abrirModalEmpleado()">
          <span style="font-size: 2.5rem;">👤+</span>
          Contratar Empleado
        </button>
        <button class="action-btn" onclick="cargarEmpleados()">
          <span style="font-size: 2.5rem;">📋</span>
          Ver Planilla
        </button>
      </div>

      <div class="employee-table-container">
        <table id="tablaEmpleados">
          <thead>
            <tr>
              <th>DPI</th>
              <th>Nombre</th>
              <th>Puesto</th>
              <th>Teléfono</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="listaEmpleados">
            <tr><td colspan="5" style="text-align:center;">Usa "Ver Planilla" para cargar datos</td></tr>
          </tbody>
        </table>
      </div>
    </main>

    <div id="modalEmpleado" class="modal-overlay">
      <div class="modal-content">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">📝 Datos del Empleado</h2>
        <form id="formEmpleado">
          <div class="form-group">
            <label>Nombre Completo *</label>
            <input type="text" id="e_nombre" required>
          </div>
        
          <div class="form-row">
            <div class="form-group">
              <label>DPI (13 dígitos) *</label>
              <input type="text" id="e_dpi" maxlength="13" required>
            </div>
            <div class="form-group">
              <label>Teléfono</label>
              <input type="tel" id="e_tel">
            </div>
          </div>
        
          <div class="form-group">
            <label>Dirección Completa</label>
            <input type="text" id="e_dir">
          </div>
        
          <div class="form-row">
            <div class="form-group">
              <label>Username *</label>
              <input type="text" id="e_username" required>
            </div>
            <div class="form-group">
              <label>Password *</label>
              <input type="password" id="e_password" required>
            </div>
          </div>
        
          <div class="form-group">
            <label>ID Puesto (1=Gerente, 2=Empleado)</label>
            <input type="number" id="e_puesto_id" required>
          </div>
        
          <div class="modal-actions">
            <button type="button" class="nav-pill" onclick="cerrarModal()" style="border:none;">Cancelar</button>
            <button type="submit" class="action-btn" style="padding: 15px 25px; font-size: 1rem;">Guardar Empleado</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="footer">
        <a class="nav-pill nav-pill--back" href="../index.html">Regresar al Menú</a>
    </footer>

    <script type="module">
      import { dbPersonas } from '../supabaseClient.js';

      // 1. Cargar Empleados
      async function cargarEmpleados() {
        const lista = document.getElementById('listaEmpleados');
        lista.innerHTML = '<tr><td colspan="5" style="text-align:center;">Cargando...</td></tr>';
        
        try {
          const { data, error } = await dbPersonas.from('empleados').select('*').eq('activo', true);
          if (error) throw error;

          lista.innerHTML = data.map(emp => `
            <tr>
              <td>${emp.dpi}</td>
              <td><strong>${emp.nombre}</strong></td>
              <td><span class="nav-pill" style="padding: 5px 12px; font-size: 0.8rem;">${emp.puesto}</span></td>
              <td>${emp.telefono || '---'}</td>
              <td>
                <button onclick="eliminarEmpleado(${emp.id})" style="border:none; background:none; cursor:pointer;">🗑️</button>
              </td>
            </tr>
          `).join('');
        } catch (err) {
          alert("Error: " + err.message);
        }
      }

      // 2. Guardar Empleado
      // Manejo del envío del formulario actualizado
      document.getElementById('formEmpleado').addEventListener('submit', async (e) => {
        e.preventDefault();

        const nuevoEmpleado = {
          nombre: document.getElementById('e_nombre').value.trim(),
          dpi: document.getElementById('e_dpi').value.trim(),
          telefono: document.getElementById('e_tel').value.trim(),
          username: document.getElementById('e_username').value.trim(),
          password: document.getElementById('e_password').value, // En texto plano por ahora
          puesto_id: parseInt(document.getElementById('e_puesto_id').value),
          activo: true
        };
      
        try {
          const { error } = await dbPersonas.from('empleados').insert([nuevoEmpleado]);
          if (error) throw error;

          alert("✅ Empleado registrado correctamente");
          cerrarModal();
          cargarEmpleados();
        } catch (err) {
          alert("❌ Error al registrar: " + err.message);
        }
      });

      // Funciones de ventana
      window.abrirModalEmpleado = () => document.getElementById('modalEmpleado').style.display = 'flex';
      window.cerrarModal = () => document.getElementById('modalEmpleado').style.display = 'none';
      window.cargarEmpleados = cargarClientes; // Alias para el botón
      
      // Función para eliminar (desactivar)
      window.eliminarEmpleado = async (id) => {
        if(confirm("¿Dar de baja a este empleado?")) {
          await dbPersonas.from('empleados').update({ activo: false }).eq('id', id);
          cargarEmpleados();
        }
      };

      // Exponer funciones al objeto window
      window.cargarEmpleados = cargarEmpleados;
    </script>
</body>
</html>
